<!DOCTYPE html>
<html lang="en">
<head>
    <title>Meeting Result</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
        }

        .navbar {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
        }

        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
        }

        .time {
            font-size: 28px;
            margin: 20px 0;
            color: #00ffcc;
            font-weight: bold;
        }

        p {
            opacity: 0.85;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background: linear-gradient(135deg, #6c63ff, #8f7cff);
            padding: 10px 20px;
            border-radius: 10px;
            transition: 0.3s;
        }

        a:hover {
            transform: scale(1.05);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="navbar">
        🤖 AI Meeting Agent
    </div>

    <div class="main">
        <div class="card">
            <h1>✅ Meeting Scheduled</h1>
            <div class="time">{{ time }}</div>
            <p>Confirmation and MoM emails sent successfully</p>

            <a href="/">Run Again 🚀</a>
        </div>
    </div>

    <div class="footer">
        Built using Flask • Agentic AI System
    </div>

</body>
</html>
